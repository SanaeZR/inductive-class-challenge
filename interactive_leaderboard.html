<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THInC Challenge Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    
    <style>
        /* Custom tweaks for the table */
        body { background-color: #f3f4f6; }
        .dataTables_wrapper { padding-top: 1rem; }
        table.dataTable thead th { background-color: #1e3a8a; color: white; border-radius: 4px; }
    </style>
</head>
<body class="text-gray-800 font-sans p-4 md:p-8">

    <div class="max-w-6xl mx-auto bg-white p-6 md:p-10 rounded-xl shadow-2xl border border-gray-200">
        
        <div class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-extrabold text-blue-900 mb-4">🏆 THInC Challenge</h1>
            <p class="text-xl text-gray-600 font-medium">Tumor Histopathology Inductive Classification Leaderboard</p>
        </div>

        <table id="leaderboard" class="display w-full stripe hover">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Team Name</th>
                    <th>Macro F1 Score</th>
                    <th>Last Updated</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        $(document).ready(function() {
            // 1. Fetch the CSV generated by your Python script
            Papa.parse("leaderboard/leaderboard.csv", {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    let tableData = [];
                    let currentRank = 1;

                    // 2. Format the data for the interactive table
                    results.data.forEach(row => {
                        // Apply medal emojis to the top 3
                        let rankDisplay = currentRank;
                        if (currentRank === 1) rankDisplay = "🥇 1";
                        if (currentRank === 2) rankDisplay = "🥈 2";
                        if (currentRank === 3) rankDisplay = "🥉 3";

                        tableData.push([
                            rankDisplay,
                            row.team,
                            parseFloat(row.score).toFixed(4), // Force 4 decimal places
                            row.date
                        ]);
                        currentRank++;
                    });

                    // 3. Initialize the interactive widget
                    $('#leaderboard').DataTable({
                        data: tableData,
                        pageLength: 25,
                        order: [[2, 'desc']], // Sort by Score descending by default
                        language: {
                            search: "🔍 Search Teams:"
                        },
                        columnDefs: [
                            { className: "text-center font-bold text-lg", targets: [0] },
                            { className: "text-center font-mono text-blue-600 font-bold", targets: [2] },
                            { className: "text-center text-gray-500", targets: [3] }
                        ]
                    });
                }
            });
        });
    </script>
</body>
</html>
